<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AUREA Cocina</title>
  <link rel="stylesheet" href="/style.css?v=0.9.18" />
  <script>
    if (!String.prototype.replaceAll) {
      String.prototype.replaceAll = function(search, replacement) {
        var target = String(this);
        if (search instanceof RegExp) return target.replace(search, replacement);
        return target.split(String(search)).join(String(replacement));
      };
    }
  </script>
</head>
<body>
  <div id="toast" class="toast"></div>

  <section id="kitchenLogin" class="login-wrap">
    <div class="card login-card">
      <div class="brand" style="margin-bottom:18px;">
        <img class="brand-logo" src="/aurea-logo.svg" alt="AUREA logo" />
        <div>
          <div class="brand-title">AUREA</div>
          <div class="brand-subtitle">Pantalla de cocina</div>
        </div>
      </div>
      <h1 style="margin:0 0 8px;">Entrar con PIN</h1>
      <p class="muted">Puede usar el mismo PIN de capitán, mesero o cocina.</p>
      <form id="kitchenLoginForm" class="form-grid">
        <label>PIN operativo
          <input class="input" id="kitchenPinLogin" inputmode="numeric" placeholder="Ej. 1234" />
        </label>
        <button class="btn" type="submit">Entrar</button>
      </form>
    </div>
  </section>

  <main id="kitchenApp" class="main kitchen-main" style="display:none;">
    <section class="client-hero">
      <div class="section-head">
        <div>
          <div class="pill" id="kitchenStaffName">Cocina</div>
          <h1 id="kitchenRestaurant">AUREA</h1>
          <p class="muted" style="line-height:1.5; margin:0;">Comandas visuales por zona. Si activas auto impresión, las próximas comandas salen en papel para esta barra.</p>
          <div id="kitchenStationScope" class="item-meta" style="margin-top:8px;"></div>
        </div>
        <div class="inline-actions end">
          <label class="check-row kitchen-print-toggle">
            <input id="autoPrintKitchen" type="checkbox" onchange="setKitchenAutoPrint(this.checked)" />
            <span>Auto imprimir</span>
          </label>
          <button class="btn secondary small" onclick="printVisiblePendingTickets()">Imprimir pendientes</button>
          <button class="btn ghost small" onclick="printKitchenTestTicket()">Probar ticket</button>
          <a class="btn secondary small" href="/staff.html" target="_blank">Meseros</a>
          <button class="btn ghost small" onclick="kitchenLogout()">Salir</button>
        </div>
      </div>
    </section>

    <section id="kitchenStationGrid" class="grid"></section>
  </main>

  <script src="/aurea-print-bridge.js?v=0.9.18"></script>
  <script src="/kitchen.js?v=0.9.18"></script>
</body>
</html>
